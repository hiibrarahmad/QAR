<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MindAR Target Compiler</title>
  <script src="../vendor/aframe.min.js"></script>
  <script src="../vendor/mindar-image-aframe.prod.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3;
           display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 32px; }
    #drop { width: min(480px, 90vw); height: 180px; border: 2px dashed #30363d; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; color: #9aa4b2;
            text-align: center; cursor: pointer; }
    #drop.over { border-color: #2f81f7; color: #2f81f7; }
    progress { width: min(480px, 90vw); }
    a { color: #2f81f7; font-size: 1.1rem; }
    #log { width: min(480px, 90vw); font-family: Consolas, monospace; font-size: .85rem;
           color: #9aa4b2; white-space: pre-wrap; background: #161b22; border-radius: 8px;
           padding: 12px; min-height: 80px; }
    .err { color: #ff7b72; }
  </style>
</head>
<body>
  <h1>Compile image → targets.mind</h1>
  <div id="drop">Drop image here / click to choose</div>
  <input id="file" type="file" accept="image/*" style="display:none" />
  <progress id="prog" max="100" value="0" style="display:none"></progress>
  <a id="dl" download="targets.mind" style="display:none">⬇ Download targets.mind</a>
  <div id="log"></div>

<script>
const drop = document.querySelector("#drop");
const fileInput = document.querySelector("#file");
const prog = document.querySelector("#prog");
const logEl = document.querySelector("#log");

function log(msg, isErr) {
  const line = document.createElement("div");
  line.textContent = msg;
  if (isErr) line.className = "err";
  logEl.appendChild(line);
}
window.onerror = (msg, src, line) => log(`JS error: ${msg} (${src}:${line})`, true);
window.onunhandledrejection = e => log(`Promise error: ${e.reason}`, true);

log(typeof window.MINDAR !== "undefined"
  ? "✓ MindAR library loaded"
  : "✗ MindAR library did NOT load — check internet connection", typeof window.MINDAR === "undefined");

drop.addEventListener("click", () => fileInput.click());
drop.addEventListener("dragover", e => { e.preventDefault(); drop.classList.add("over"); });
drop.addEventListener("dragleave", () => drop.classList.remove("over"));
drop.addEventListener("drop", e => {
  e.preventDefault(); drop.classList.remove("over");
  if (e.dataTransfer.files[0]) compile(e.dataTransfer.files[0]);
});
fileInput.addEventListener("change", () => { if (fileInput.files[0]) compile(fileInput.files[0]); });

function blobToImage(blob) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("image failed to decode"));
    img.src = URL.createObjectURL(blob);
  });
}

// rasterize whatever we got (svg, png, jpg) to a plain 1200px PNG image
async function toBitmap(blob) {
  const img = await blobToImage(blob);
  const W = 1200;
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = Math.round(W * (img.height / img.width)) || W;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  const pngBlob = await new Promise(res => canvas.toBlob(res, "image/png"));
  return blobToImage(pngBlob);
}

async function compile(blob) {
  try {
    log(`Loading image (${blob.type || "unknown type"}, ${blob.size} bytes)…`);
    const img = await toBitmap(blob);
    log(`✓ Image ready: ${img.width}×${img.height}`);

    drop.textContent = "Compiling… keep this tab open";
    prog.style.display = "block";
    log("Compiling (15–60 s)…");

    const compiler = new window.MINDAR.IMAGE.Compiler();
    await compiler.compileImageTargets([img], p => { prog.value = p; });
    const buffer = await compiler.exportData();
    log(`✓ Compiled — ${buffer.byteLength} bytes`);

    const dl = document.querySelector("#dl");
    dl.href = URL.createObjectURL(new Blob([buffer]));
    dl.style.display = "block";
    drop.textContent = "Done ✓ — download below";
    dl.click(); // auto-trigger the download
    log("✓ Download started (check your Downloads folder)");
  } catch (err) {
    drop.textContent = "Failed — see log";
    log("✗ " + (err.message || err), true);
  }
}

// auto-compile: ?src=/qr-card.svg
const auto = new URLSearchParams(location.search).get("src");
if (auto) {
  log(`Fetching ${auto}…`);
  fetch(auto)
    .then(r => { if (!r.ok) throw new Error(`fetch ${r.status}`); return r.blob(); })
    .then(compile)
    .catch(e => log("✗ Fetch failed: " + e.message, true));
}
</script>
</body>
</html>
