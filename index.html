<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>AR Experience</title>
  <script src="vendor/aframe.min.js"></script>
  <script src="vendor/mindar-image-aframe.prod.js"></script>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; }

    #start-overlay {
      position: fixed; inset: 0; z-index: 10;
      background: radial-gradient(120% 120% at 50% 0%, #16233b 0%, #0d1117 60%);
      color: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; text-align: center; padding: 24px;
    }
    #logo {
      width: 84px; height: 84px; border-radius: 24px;
      background: linear-gradient(135deg, #2f81f7, #8250df);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem; font-weight: 800; color: #fff;
      box-shadow: 0 12px 40px rgba(47,129,247,.35);
    }
    #start-overlay h1 { font-size: 1.5rem; margin: 0; letter-spacing: .02em; }
    #start-overlay p { color: #9aa4b2; max-width: 320px; margin: 0; line-height: 1.5; }
    #start-btn {
      background: linear-gradient(135deg, #2f81f7, #1f6feb); color: #fff;
      border: none; border-radius: 999px; margin-top: 6px;
      padding: 16px 52px; font-size: 1.15rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 8px 28px rgba(47,129,247,.4);
    }
    #start-btn:active { transform: scale(.97); }
    .steps { display: flex; gap: 20px; color: #6e7681; font-size: .8rem; }
    .steps span b { display: block; color: #9aa4b2; font-size: 1rem; }
    #status {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 5; background: rgba(0,0,0,.55); color: #fff;
      padding: 8px 18px; border-radius: 999px; font-size: .85rem;
      pointer-events: none; transition: opacity .3s;
    }
  </style>
</head>
<body>

<script>
/* ============================================================
   CONFIG — this is the only part you need to edit.

   MODE:
     "demo"  → built-in rotating cube + text (works with zero assets)
     "model" → 3D model (.glb/.gltf) from SRC
     "video" → video (.mp4, H.264) from SRC
     "image" → flat image, e.g. your CV exported as PNG, from SRC
   ============================================================ */
const CONFIG = {
  MODE: "demo",
  TEXT: "HIIBRARAHMAD",           // main 3D text shown in demo mode
  SUBTEXT: "It works on iPhone!", // smaller line under it
  SRC: "assets/content.glb",   // path to your model / video / image
  SCALE: 1.0,                  // overall size multiplier
  ASPECT: 1.414,               // image/video height ÷ width (1.414 = A4 portrait CV)
  ROTATE_MODEL: true,          // slow spin for 3D models
};
</script>

<div id="start-overlay">
  <div id="logo">M</div>
  <h1>Ibrar Ahmad AR</h1>
  <p>Point your camera back at the QR code you just scanned — the experience appears right on top of it.</p>
  <button id="start-btn">Launch AR</button>
  <div class="steps">
    <span><b>1</b> Allow camera</span>
    <span><b>2</b> Aim at QR</span>
    <span><b>3</b> Enjoy</span>
  </div>
</div>
<div id="status" style="opacity:0">Searching for QR code…</div>

<a-scene id="scene" mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; filterMinCF: 0.001; filterBeta: 5000; missTolerance: 12; warmupTolerance: 1; uiScanning: yes; uiLoading: no;"
         color-space="sRGB" renderer="colorManagement: true; physicallyCorrectLights: true"
         embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

  <a-assets id="asset-root" timeout="30000"></a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="anchor" mindar-image-target="targetIndex: 0"></a-entity>
</a-scene>

<script>
const scene   = document.querySelector("#scene");
const anchor  = document.querySelector("#anchor");
const assets  = document.querySelector("#asset-root");
const overlay = document.querySelector("#start-overlay");
const status  = document.querySelector("#status");
let videoEl = null;

function buildContent() {
  const s = CONFIG.SCALE;
  if (CONFIG.MODE === "model") {
    const m = document.createElement("a-gltf-model");
    m.setAttribute("src", CONFIG.SRC);
    m.setAttribute("scale", `${s} ${s} ${s}`);
    m.setAttribute("position", "0 0 0.1");
    if (CONFIG.ROTATE_MODEL) {
      m.setAttribute("animation", "property: rotation; to: 0 360 0; dur: 12000; easing: linear; loop: true");
    }
    anchor.appendChild(m);

  } else if (CONFIG.MODE === "video") {
    videoEl = document.createElement("video");
    videoEl.id = "ar-video";
    videoEl.src = CONFIG.SRC;
    videoEl.setAttribute("playsinline", "");
    videoEl.setAttribute("webkit-playsinline", "");
    videoEl.muted = true;        // required for autoplay on iOS; unmuted needs a tap
    videoEl.loop = true;
    videoEl.crossOrigin = "anonymous";
    assets.appendChild(videoEl);

    const v = document.createElement("a-video");
    v.setAttribute("src", "#ar-video");
    v.setAttribute("width", s);
    v.setAttribute("height", s * CONFIG.ASPECT);
    v.setAttribute("position", "0 0 0.01");
    anchor.appendChild(v);

  } else if (CONFIG.MODE === "image") {
    const i = document.createElement("a-image");
    i.setAttribute("src", CONFIG.SRC);
    i.setAttribute("width", s);
    i.setAttribute("height", s * CONFIG.ASPECT);
    i.setAttribute("position", "0 0 0.01");
    anchor.appendChild(i);

  } else { // demo — floating 3D text over the QR
    // dark backdrop panel so the text pops against any background
    const panel = document.createElement("a-plane");
    panel.setAttribute("color", "#0d1117");
    panel.setAttribute("opacity", "0.85");
    panel.setAttribute("width", 1.5 * s);
    panel.setAttribute("height", 0.6 * s);
    panel.setAttribute("radius", "0.05");
    panel.setAttribute("position", "0 0 0.05");
    anchor.appendChild(panel);

    // faked extrusion: dark copy slightly behind the bright front copy
    const mkText = (value, color, y, z, width) => {
      const t = document.createElement("a-text");
      t.setAttribute("value", value);
      t.setAttribute("color", color);
      t.setAttribute("align", "center");
      t.setAttribute("width", width);
      t.setAttribute("position", `0 ${y} ${z}`);
      panel.appendChild(t);
      return t;
    };
    mkText(CONFIG.TEXT, "#1b3a6b", 0.132 * s, 0.06, 2.2 * s);
    mkText(CONFIG.TEXT, "#4da3ff", 0.14 * s, 0.09, 2.2 * s);
    mkText(CONFIG.SUBTEXT, "#e6edf3", -0.13 * s, 0.07, 1.3 * s);

    // gentle hover + sway so it reads as 3D
    panel.setAttribute("animation__hover",
      "property: position; from: 0 -0.05 0.05; to: 0 0.08 0.15; dir: alternate; dur: 2200; easing: easeInOutSine; loop: true");
    panel.setAttribute("animation__sway",
      "property: rotation; from: 0 -12 0; to: 0 12 0; dir: alternate; dur: 3000; easing: easeInOutSine; loop: true");

    // spinning accent ring behind everything
    const ring = document.createElement("a-torus");
    ring.setAttribute("color", "#2f81f7");
    ring.setAttribute("radius", 0.55 * s);
    ring.setAttribute("radius-tubular", "0.012");
    ring.setAttribute("segments-tubular", "40");
    ring.setAttribute("position", "0 0 0.02");
    ring.setAttribute("animation",
      "property: rotation; to: 0 0 360; dur: 9000; easing: linear; loop: true");
    anchor.appendChild(ring);
  }
}

document.querySelector("#start-btn").addEventListener("click", async () => {
  overlay.style.display = "none";
  status.style.opacity = 1;
  buildContent();
  const mindar = scene.systems["mindar-image-system"];
  mindar.start();
});

// Grace period: when tracking drops for a moment (fast camera move), keep the
// content frozen at its last pose for 1s instead of blinking off instantly.
let lostTimer = null;
anchor.addEventListener("targetFound", () => {
  clearTimeout(lostTimer);
  status.textContent = "Tracking ✓";
  status.style.background = "rgba(35,134,54,.75)";
  if (videoEl) videoEl.play();
});
anchor.addEventListener("targetLost", () => {
  anchor.object3D.visible = true;            // override MindAR's instant hide
  clearTimeout(lostTimer);
  lostTimer = setTimeout(() => {
    anchor.object3D.visible = false;
    if (videoEl) videoEl.pause();
  }, 1000);
  status.textContent = "Searching for QR code…";
  status.style.background = "rgba(0,0,0,.55)";
});

// tap to unmute video
document.body.addEventListener("click", () => {
  if (videoEl && !videoEl.paused) videoEl.muted = false;
});
</script>
</body>
</html>
